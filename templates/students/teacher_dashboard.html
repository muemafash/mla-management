{% extends 'base.html' %}

{% block content %}
  <h2>Teacher Dashboard</h2>
  <p><a href="{% url 'students:add_mark' %}">Add Student Mark</a></p>

  <h3>Students</h3>
  <table>
    <thead>
      <tr><th>Admission No</th><th>Name</th><th>Class</th><th>Reportcard</th></tr>
    </thead>
    <tbody>
      {% for s in students %}
        <tr>
          <td>{{ s.admission_no }}</td>
          <td>{{ s.user.get_full_name }}</td>
          <td>{{ s.current_class }}</td>
          <td><a href="{% url 'students:student_reportcard' s.id %}">View</a></td>
        </tr>
      {% empty %}
        <tr><td colspan="4">No students.</td></tr>
      {% endfor %}
    </tbody>
  </table>

{% endblock %}
